<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista TODO</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>

  <body>
    <main>
        <h1>Zadania zrobienia:</h1>
        <div>
            <input type="text" id="todoInput" placeholder="Treść zadania">
            <button id="addButton">Dodaj zadanie</button>
        </div>
        <div>
            <ul id="todoList">
                <li>Kupić mleko</li>
                <li>Wrócić z mlekiem</li>
                <li class="completed">Zrobić laby</li>
            </ul>
        </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
