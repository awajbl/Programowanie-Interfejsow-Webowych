<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dodaj grę</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-bar">
      <h1>Dodaj nową grę</h1>
    </header>

    <main class="form-page">
      <form class="game-form">
        <label>Nazwa gry:</label>
        <input type="text" />

        <label>Opis:</label>
        <textarea></textarea>

        <label>Cena:</label>
        <input type="number" />

        <label>Rodzaj:</label>
        <select>
          <option>Wszystkie</option>
          <option>Klasyczne</option>
          <option>Strategiczne</option>
          <option>Ekonomiczne</option>
          <option>Kooperacyjne</option>
          <option>Imprezowe</option>
          <option>Łamigłówki</option>
          <option>RPG</option>
          <option>Wojenne</option>
        </select>

        <label>Minimalna liczba graczy:</label>
        <input type="number" />

        <label>Maksumalna liczba graczy:</label>
        <input type="number" />

        <label>Minimalny czas gry:</label>
        <input type="number" />

        <label>Maksymalny czas gry:</label>
        <input type="number" />

        <label>Wydawnictwo:</label>
        <input type="text" />

        <button class="primary">Zapisz</button>
      </form>
    </main>
  </body>
</html>
